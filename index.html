<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>@xtriz</title>
<link rel="icon" type="image/png" href="assets/avatar.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Outfit:wght@300;400;500;600&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;cursor:none!important}
::-webkit-scrollbar{width:0}
html,body{width:100%;height:100%;overflow:hidden;background:#080a09;color:#fff;font-family:'Outfit',sans-serif;cursor:none}

#bg{position:fixed;inset:0;z-index:0}
#bgv{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.4s}
#bgv.on{opacity:1}
#bg::after{content:'';position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(6,8,10,.45) 0%,rgba(6,8,10,.2) 40%,rgba(6,8,10,.6) 75%,rgba(6,8,10,.92) 100%)}
#bg::before{content:'';position:absolute;inset:0;z-index:2;background-image:radial-gradient(rgba(255,255,255,.022) 1px,transparent 1px);background-size:28px 28px}

.ptc{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.pt{position:absolute;width:2px;height:2px;background:rgba(255,255,255,.5);border-radius:50%;animation:ptf linear infinite}
@keyframes ptf{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh);opacity:0}}
#cc{display:none}

.stage{position:relative;z-index:10;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}

@property --ca{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes ca-spin{to{--ca:360deg}}
@keyframes glass-baf{0%,100%{background-position:100% 0}50%{background-position:0% 0}}

.card{
  position:relative;width:100%;max-width:720px;
  background:rgba(18,20,18,.28);
  border:1px solid rgba(255,255,255,.07);
  border-radius:24px;padding:36px;
  backdrop-filter:blur(22px) saturate(120%);
  -webkit-backdrop-filter:blur(22px) saturate(120%);
  box-shadow:inset 1.5px 1.5px 3px rgba(255,255,255,.25),inset 3px 3px 8px rgba(255,255,255,.10),0 20px 50px rgba(0,0,0,.8);
  display:flex;flex-direction:column;gap:20px;
  animation:ca-spin 7s linear infinite;
  transition:transform .1s ease-out,box-shadow .1s ease-out;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:24px;padding:1.5px;
  background:conic-gradient(from var(--ca),transparent 60%,rgba(255,255,255,.35) 90%,rgba(255,255,255,.9) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;z-index:10;
  filter:drop-shadow(0 0 14px rgba(255,255,255,.85));
  animation:ca-spin 4s linear infinite;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:24px;
  background:linear-gradient(115deg,transparent 45%,rgba(255,255,255,.05) 50%,transparent 55%);
  background-size:300% 100%;animation:glass-baf 7s ease-in-out infinite;
  pointer-events:none;z-index:1;
}

.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;width:100%}
.top-left{display:flex;flex-direction:column;gap:14px;flex:1;min-width:0;overflow:visible}

.name-row{display:flex;align-items:center;gap:10px;flex-wrap:nowrap;overflow:visible}
.name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,5vw,4rem);
  font-weight:300;font-style:italic;color:#fff;
  letter-spacing:-.02em;line-height:1;
  display:inline-block;position:relative;white-space:nowrap;flex-shrink:0;
  text-shadow:0 0 20px rgba(255,255,255,.7),0 0 40px rgba(255,255,255,.3);
}
.name::after{display:none}
@keyframes namePulse{
  0%,100%{opacity:.15;text-shadow:none}
  50%{opacity:1;text-shadow:0 0 12px rgba(255,255,255,.9),0 0 24px rgba(255,255,255,.6),0 0 40px rgba(255,255,255,.3)}
}
@keyframes ns{0%{background-position:220% 0}55%{background-position:-30% 0}100%{background-position:-30% 0}}

.badge-pill{
  display:flex;align-items:center;gap:4px;flex-wrap:nowrap;flex-shrink:1;overflow:hidden;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);
  border-radius:30px;padding:5px 10px;
}
.bwrap{position:relative;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.bwrap img{width:26px;height:26px;object-fit:contain;display:block;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),filter .2s;cursor:default}
.bwrap:hover img{transform:scale(1.45) translateY(-3px);filter:drop-shadow(0 0 8px rgba(255,255,255,.5))}
.tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:rgba(8,10,8,.95);border:1px solid rgba(255,255,255,.15);
  color:#fff;font-size:.72rem;font-family:'Outfit',sans-serif;
  white-space:nowrap;padding:5px 10px;border-radius:8px;
  pointer-events:none;opacity:0;transition:opacity .15s;z-index:9998;
  backdrop-filter:blur(10px);
}
.bwrap:hover .tip{opacity:0}

.bio{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1rem,2.2vw,1.25rem);font-weight:300;font-style:italic;
  color:rgba(255,255,255,.5);line-height:1.5;min-height:24px;
}
.bio::after{content:'|';animation:blink 1s step-end infinite;margin-left:2px;opacity:.3}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:0}}

.socials{display:flex;gap:14px}
.socials a{color:rgba(255,255,255,.6);font-size:22px;text-decoration:none;transition:transform .2s,color .2s}
.socials a:hover{transform:translateY(-3px) scale(1.1);color:#fff}

.av-wrap{position:relative;width:155px;height:155px;flex-shrink:0}
.av-wrap::before{
  content:'';position:absolute;inset:-2px;border-radius:18px;padding:2px;
  background-image:
    linear-gradient(0deg,rgba(255,255,255,0) 40%,rgba(255,255,255,1) 50%,rgba(255,255,255,0) 60%),
    linear-gradient(0deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.15) 100%);
  background-size:100% 200%,100% 100%;background-repeat:no-repeat;
  animation:avs 3s linear infinite alternate;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  pointer-events:none;z-index:2;
  filter:drop-shadow(0 0 14px rgba(255,255,255,.9));
}
@keyframes avs{0%{background-position:0 150%,0 0}100%{background-position:0 -50%,0 0}}
.av-img{width:155px;height:155px;border-radius:18px;object-fit:cover;border:1.5px solid rgba(255,255,255,.15);display:block}
.av-badge{position:absolute;bottom:-10px;right:-10px;width:40px;height:40px;object-fit:contain;z-index:5;pointer-events:none;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8))}

.cards{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;width:100%}
.panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;transition:border-color .2s;min-height:96px}
.panel:hover{border-color:rgba(255,255,255,.2)}

.dc-av{position:relative;flex-shrink:0}
.dc-av img{width:58px;height:58px;border-radius:50%;object-fit:cover;background:#111;display:block}
.sdot{position:absolute;bottom:-1px;right:-1px;width:15px;height:15px;border-radius:50%;background:#4ade80;border:2.5px solid #0d0f0d;z-index:3;transition:background .4s ease;box-shadow:0 0 6px currentColor}
.dc-info{flex:1;min-width:0}
.dc-name{font-size:.95rem;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-act{font-size:.75rem;color:rgba(255,255,255,.55);white-space:pre-line;overflow-wrap:break-word;line-height:1.35;margin-top:2px}
.dc-det{font-size:.7rem;color:rgba(255,255,255,.35);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-art{width:58px;height:58px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#111}

.guild{justify-content:space-between}
.guild-l{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.guild-icon{width:58px;height:58px;object-fit:contain;flex-shrink:0}
.guild-info{flex:1;min-width:0}
.guild-name{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guild-stats{display:flex;gap:5px;font-size:.68rem;color:rgba(255,255,255,.5);margin-top:3px;align-items:center}
.don{width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block;flex-shrink:0}
.doff{width:5px;height:5px;border-radius:50%;background:#6b7280;display:inline-block;flex-shrink:0}
.jbtn{padding:3px 12px;background:#248046;border:none;border-radius:6px;font-size:.65rem;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;text-decoration:none;white-space:nowrap;transition:background .2s}
.jbtn:hover{background:#1a6334}

.music{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:20px 24px;width:100%}
.mtitle{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:rgba(255,255,255,.75);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mbody{display:flex;align-items:center;gap:13px}
.mart{width:72px;height:72px;border-radius:12px;object-fit:cover;background:rgba(255,255,255,.08);flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.mright{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:center;gap:7px}
.tme{font-family:'Geist Mono',monospace;font-size:.58rem;color:rgba(255,255,255,.3);min-width:24px;font-variant-numeric:tabular-nums}
.pbar{flex:1;height:2px;background:rgba(255,255,255,.12);border-radius:10px;cursor:pointer;position:relative;transition:height .15s}
.pbar:hover{height:4px}
.pfill{height:100%;background:rgba(255,255,255,.6);border-radius:10px;width:0%;transition:width .1s linear;position:relative}
.pfill::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%) scale(0);width:8px;height:8px;background:#fff;border-radius:50%;transition:transform .15s}
.pbar:hover .pfill::after{transform:translateY(-50%) scale(1)}
.crow{display:flex;align-items:center;gap:7px}
.mbtn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mbtn svg{width:12px;height:12px;fill:currentColor}
.mbtn:hover{background:rgba(255,255,255,.12);color:#fff;transform:scale(1.1)}
.mbtn.play{width:32px;height:32px;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);color:#fff}
.mbtn.play:hover{background:rgba(255,255,255,.18)}
.vols{-webkit-appearance:none;appearance:none;flex:1;height:2px;border-radius:10px;background:rgba(255,255,255,.12);outline:none;cursor:pointer}
.vols::-webkit-slider-thumb{-webkit-appearance:none;width:0;height:0}
.vols:hover::-webkit-slider-thumb{width:8px;height:8px;border-radius:50%;background:#fff}

.stats{display:flex;justify-content:space-between;align-items:center;font-family:'Geist Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.3);padding:0 2px;font-variant-numeric:tabular-nums;width:100%}
.stats span{display:flex;align-items:center;gap:5px}

@media(max-width:560px){
  .cards{grid-template-columns:1fr}
  .top{flex-direction:column-reverse;align-items:center}
  .card{padding:22px 16px}
}
</style>
</head>

<script>


(function tick(){
  const p={};
  new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Ho_Chi_Minh',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(new Date()).forEach(function(x){p[x.type]=x.value;});
  var el=document.getElementById('clk');if(el)el.textContent=p.hour+':'+p.minute+':'+p.second;
  setTimeout(tick,1000);
})();

(function(){
  var c=document.getElementById('ptc');
  for(var i=0;i<16;i++){var p=document.createElement('div');p.className='pt';p.style.cssText='left:'+Math.random()*100+'%;width:'+(Math.random()*2+1)+'px;height:'+(Math.random()*2+1)+'px;animation-duration:'+(8+Math.random()*12)+'s;animation-delay:'+(-Math.random()*15)+'s;opacity:'+(Math.random()*.4+.15);c.appendChild(p);}
})();

var card=document.getElementById('card');
document.addEventListener('mousemove',function(e){
  var r=card.getBoundingClientRect();
  var dx=Math.max(-1,Math.min(1,(e.clientX-(r.left+r.width/2))/(r.width/2)));
  var dy=Math.max(-1,Math.min(1,(e.clientY-(r.top+r.height/2))/(r.height/2)));
  card.style.transform='perspective(1200px) rotateX('+(dy*-4)+'deg) rotateY('+(dx*4)+'deg) scale3d(1.008,1.008,1.008)';
  card.style.boxShadow=(-dx*8)+'px '+(dy*8)+'px 40px rgba(0,0,0,.55),inset 1.5px 1.5px 3px rgba(255,255,255,.25),inset 3px 3px 8px rgba(255,255,255,.10)';
});
document.addEventListener('mouseleave',function(){card.style.transform='';card.style.boxShadow='';});


// CURSOR EFFECT
function loadCursorEffect(type, customColor) {
    if (window._cursorEffectDestroy) { window._cursorEffectDestroy(); window._cursorEffectDestroy = null; }

    var defaultCanvas = document.getElementById('cc');
    if (defaultCanvas) defaultCanvas.style.display = 'none';

    if (!type || type === 'none') {
        if (defaultCanvas) defaultCanvas.style.display = '';
        return;
    } else if (type === 'canvas') {
        (function () {
            var cvs = document.createElement('canvas');
            cvs.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:9991;';
            document.body.appendChild(cvs);
            var ctx2 = cvs.getContext('2d');
            cvs.width = innerWidth - 20; cvs.height = innerHeight;
            ctx2.running = true; ctx2.frame = 1;
            var mouse = { x: innerWidth / 2, y: innerHeight / 2 };
            var trails = []; var color = customColor || '#ffffff';

  function seek(e){var r=pb.getBoundingClientRect();var x=Math.max(0,Math.min(e.clientX-r.left,r.width));if(aud.duration&&isFinite(aud.duration))aud.currentTime=(x/r.width)*aud.duration;}
  pb.addEventListener('mousedown',function(e){drag=true;seek(e);});
  document.addEventListener('mousemove',function(e){if(drag)seek(e);});
  document.addEventListener('mouseup',function(){drag=false;});
  document.getElementById('vol').addEventListener('input',function(){aud.volume=parseFloat(this.value);});
  aud.volume=0.5;
})();

(function(){
  var UID='1299939910043701258';
  var SC={online:'#4ade80',idle:'#facc15',dnd:'#f87171',offline:'#6b7280'};
  function fp(){
    fetch('https://api.lanyard.rest/v1/users/'+UID).then(function(r){return r.json();}).then(function(d){
      if(!d.success)return;
      var dt=d.data;
      // Avatar
      document.getElementById('dc-av').src='https://cdn.discordapp.com/avatars/'+UID+'/'+dt.discord_user.avatar+'.png?size=128';

      // Status dot + text
      var statusMap = {
        online:  { color:'#4ade80', text:'online',  icon:'🟢' },
        idle:    { color:'#facc15', text:'idle',     icon:'🌙' },
        dnd:     { color:'#f87171', text:'dnd',      icon:'⛔' },
        offline: { color:'#6b7280', text:'offline',  icon:'⚫' }
      };
      var st = statusMap[dt.discord_status] || statusMap.offline;
      var dot = document.getElementById('sdot');
      dot.style.background = st.color;
      dot.title = st.text;

      // Activity
      var acts = dt.activities || [];
      var custom = acts.find(function(a){ return a.type === 4; }); // Custom status
      var game   = acts.find(function(a){ return a.type === 0; }); // Game
      var music  = acts.find(function(a){ return a.type === 2; }); // Spotify/Music

      var actEl  = document.getElementById('dc-act');
      var detEl  = document.getElementById('dc-det');
      var artEl  = document.getElementById('dc-art');

      function wrap20(str){
        var words = String(str).split(' ');
        var lines = [], cur = '';
        words.forEach(function(w){
          if(cur.length === 0) cur = w;
          else if((cur + ' ' + w).length <= 20) cur += ' ' + w;
          else { lines.push(cur); cur = w; }
        });
        if(cur) lines.push(cur);
        return lines.join('\n');
      }
      function setAct(text){ actEl.textContent = wrap20(text); }

      if(game){
        // Đang chơi game - ưu tiên cao nhất
        setAct('🎮 ' + (game.name || ''));
        detEl.textContent = game.details || game.state || '';
        if(game.assets && game.assets.large_image){
          artEl.src = game.assets.large_image.startsWith('mp:external')
            ? 'https://media.discordapp.net/' + game.assets.large_image.replace('mp:','')
            : 'https://cdn.discordapp.com/app-assets/' + game.application_id + '/' + game.assets.large_image + '.png';
          artEl.style.display = 'block';
        } else artEl.style.display = 'none';
      } else if(music){
        // Đang nghe nhạc
        setAct('🎵 ' + (music.name || ''));
        detEl.textContent = (music.details || '') + (music.state ? ' — ' + music.state : '');
        if(music.assets && music.assets.large_image){
          artEl.src = music.assets.large_image.startsWith('mp:external')
            ? 'https://media.discordapp.net/' + music.assets.large_image.replace('mp:','')
            : 'https://cdn.discordapp.com/app-assets/' + music.application_id + '/' + music.assets.large_image + '.png';
          artEl.style.display = 'block';
        } else artEl.style.display = 'none';
      } else if(custom && custom.state){
        // Custom status: hiện emoji + text
        var emoji = custom.emoji ? (custom.emoji.id 
          ? '' // custom emoji không hiện được dạng text
          : custom.emoji.name + ' ') : '';
        setAct(emoji + custom.state);
        detEl.textContent = st.text;
        artEl.style.display = 'none';
      } else {
        setAct(st.text);
        detEl.textContent = '';
        artEl.style.display = 'none';
      }
    }).catch(function(){});
  }
  fp();setInterval(fp,15000);
})();

// BADGE TOOLTIP JS (bypass stacking context)
(function(){
  var tt = document.createElement('div');
  tt.style.cssText = 'position:fixed;z-index:99999;background:rgba(8,10,8,.96);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:12px;font-family:Outfit,sans-serif;padding:5px 12px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,.5)';
  document.body.appendChild(tt);

  document.querySelectorAll('.bwrap').forEach(function(el){
    var tip = el.querySelector('.tip');
    if(!tip) return;
    var text = tip.textContent;

    el.addEventListener('mouseenter', function(e){
      tt.textContent = text;
      tt.style.opacity = '1';
      var x = e.clientX, y = e.clientY;
      tt.style.left = x + 'px';
      tt.style.top = (y - 40) + 'px';
    });
    el.addEventListener('mousemove', function(e){
      tt.style.left = (e.clientX - tt.offsetWidth/2) + 'px';
      tt.style.top = (e.clientY - 44) + 'px';
    });
    el.addEventListener('mouseleave', function(){
      tt.style.opacity = '0';
    });
  });
})();

(function(){

})();

// VIEW COUNTER
(function(){
  var WORKER = 'https://server-stats.dtri21666.workers.dev';

  // Ping +1 view khi load
  fetch(WORKER + '/api/view', { method: 'POST', cache: 'no-store' })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var el = document.getElementById('view-count');
      if(el && d.views != null){
        el.textContent = d.views >= 1000
          ? (d.views / 1000).toFixed(1) + 'k'
          : d.views;
      }
    })
    .catch(function(){
      // Fallback: chỉ fetch không tăng
      fetch(WORKER + '/api/view', { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){
          var el = document.getElementById('view-count');
          if(el && d.views != null){
            el.textContent = d.views >= 1000
              ? (d.views / 1000).toFixed(1) + 'k'
              : d.views;
          }
        }).catch(function(){
          var el = document.getElementById('view-count');
          if(el) el.textContent = '—';
        });
    });
})();
